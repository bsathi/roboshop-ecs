events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    # Cloud Map DNS names (roboshop.local namespace)
    upstream catalogue { server catalogue.roboshop.local:8080; }
    upstream cart      { server cart.roboshop.local:8080;      }
    upstream user      { server user.roboshop.local:8080;      }
    upstream payment   { server payment.roboshop.local:8080;   }
    upstream shipping  { server shipping.roboshop.local:8080;  }

    server {
        listen 8080;
        root /usr/share/nginx/html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/catalogue/ {
            proxy_pass http://catalogue/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/cart/ {
            proxy_pass http://cart/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/user/ {
            proxy_pass http://user/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/payment/ {
            proxy_pass http://payment/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/shipping/ {
            proxy_pass http://shipping/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
